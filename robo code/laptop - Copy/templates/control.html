<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f44336;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #4caf50;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn-start {
            background: #4caf50;
            color: white;
        }
        
        .btn-start:hover {
            background: #45a049;
        }
        
        .btn-stop {
            background: #f44336;
            color: white;
        }
        
        .btn-stop:hover {
            background: #da190b;
        }
        
        .movement-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .movement-btn {
            padding: 20px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .movement-btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }
        
        .movement-btn:active {
            transform: scale(0.95);
        }
        
        .forward { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .stop-center { grid-column: 2; grid-row: 2; background: #ff9800; }
        .stop-center:hover { background: #e68a00; }
        .right { grid-column: 3; grid-row: 2; }
        .backward { grid-column: 2; grid-row: 3; }
        
        .emergency-stop {
            width: 100%;
            padding: 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .emergency-stop:hover {
            background: #da190b;
        }
        
        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-top: 20px;
            font-size: 1.1em;
        }
        
        .back-btn:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Robot Control Panel</h1>
            <p style="color: rgba(255,255,255,0.9);">Remote robot command interface</p>
        </header>
        
        <div class="controls-grid">
            <div class="card">
                <h2>📹 Video Feed</h2>
                <img src="/video_feed" width="640" height="480" 
                     style="width:100%; border-radius:8px;"
          git 
                <button class="emergency-stop" onclick="emergencyStop()">🚨 EMERGENCY STOP</button>
                
                <p style="color: #666; font-size: 0.9em; margin-top: 15px; text-align: center;">
                    💡 Use arrow keys to control movement. Spacebar to Stop.
                </p>
            </div>
        </div>
        
        <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>
    
    <script>
        let currentMode = 'manual';
        
        function updateMode(mode) {
            currentMode = mode;
            const badge = document.getElementById('modeBadge');
            if (mode === 'manual') {
                badge.textContent = 'MANUAL';
                badge.style.background = '#c8e6c9';
                badge.style.color = '#2e7d32';
            } else {
                badge.textContent = 'AUTONOMOUS';
                badge.style.background = '#fff3e0';
                badge.style.color = '#e65100';
            }
        }

        function updateStatus(message, online = false) {
            document.getElementById('statusText').textContent = message;
            const light = document.getElementById('statusLight');
            if (online) {
                light.classList.add('online');
            } else {
                light.classList.remove('online');
            }
        }
        
                // ── Single Unified Control Core Function ──────────────────────────────
        async function sendRobotCommand(commandName) {
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: commandName })
                });

                const data = await response.json();
                if (!response.ok) {
                    updateStatus(`x Error: ${data.error || 'Command rejected'}`, false);
                } else {
                    const msg = data.executed
                        ? `Moving: ${commandName.toUpperCase()}`
                        : `Autonomous mode active — command ignored`;
                    updateStatus(msg, data.executed);
                }
            } catch (err) {
                console.error('Error sending command:', err);
                updateStatus('X Connection Error', false);
            }
        }
                
        // ── Mode Selection Handler (Switches Manual/Autonomous) ────────────────
        async function setRobotMode(modeName) {
            try {
                const response = await fetch('/api/mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: modeName })
                });
                
                const data = await response.json();
                if (response.ok) {
                    updateMode(modeName);
                    if(modeName === 'manual') {
                        updateStatus(':) Manual Control Enabled', true);
                    } else {
                        updateStatus(';] Autonomous Mode Active', true);
                    }
                }
            } catch (err) {
                console.error('Error setting mode:', err);
                updateStatus('X Mode Switch Failed', false);
            }
        }
        
      async function emergencyStop() {
    await setRobotMode('manual');
    await sendRobotCommand('stop');
    updateStatus('!!!! EMERGENCY STOP ACTIVATED', false);
}
        // ── Keyboard Event Bindings ───────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (currentMode !== 'manual') return; // Only allow keys in manual mode
            
            switch(e.key) {
                case 'ArrowUp':    sendRobotCommand('forward');  e.preventDefault(); break;
                case 'ArrowDown':  sendRobotCommand('backward'); e.preventDefault(); break;
                case 'ArrowLeft':  sendRobotCommand('left');     e.preventDefault(); break;
                case 'ArrowRight': sendRobotCommand('right');    e.preventDefault(); break;
                case ' ':          sendRobotCommand('stop');     e.preventDefault(); break;
            }

        });
        
        // Initialize status
        window.addEventListener('load', async () => {
        const r = await fetch('/api/mode');
        const data = await r.json();
        updateMode(data.mode);
        updateStatus(currentMode === 'manual'
            ? 'Manual control enabled'
            : 'Autonomous mode active', true);
    });

    </script>
</body>
</html>
