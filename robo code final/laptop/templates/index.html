<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moisture Detection Robot - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .connection-status {
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        
        .connection-status.connected {
            background: #51cf66;
            color: white;
        }
        
        .connection-status.disconnected {
            background: #ff6b6b;
            color: white;
        }
        
        nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        nav a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        nav a:hover {
            background: #764ba2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .readings-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .severity-critical {
            background: #ff6b6b;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .severity-moderate {
            background: #ffa500;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .severity-minor {
            background: #51cf66;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Moisture Detection Robot</h1>
            <p>Real-time foundation moisture inspection system</p>
            <div class="connection-status disconnected" id="connection-status">
                🔴 Checking connection...
            </div>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/map">GPS Map</a>
                <a href="/report">Reports</a>
                <a href="/control">Control</a>
            </nav>
        </header>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>
        
        <div id="error-container"></div>
        
        <div class="stats-grid" id="stats-container">
            <div class="loading">Loading statistics...</div>
        </div>
        
        <div class="readings-container">
            <h2>Recent Moisture Readings</h2>
            <table id="readings-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>GPS Location</th>
                        <th>Moisture %</th>
                        <th>Temperature</th>
                        <th>Severity</th>
                    </tr>
                </thead>
                <tbody id="readings-body">
                    <tr><td colspan="5" style="text-align: center; padding: 40px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let isConnected = false;
        
        function checkConnection() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    isConnected = data.connected;
                    const status = document.getElementById('connection-status');
                    
                    if (isConnected) {
                        status.className = 'connection-status connected';
                        status.textContent = '🟢 Connected to Pi';
                    } else {
                        status.className = 'connection-status disconnected';
                        status.textContent = '🔴 Pi Not Connected';
                    }
                    
                    console.log(`[Dashboard] Connection status: ${data.message}`);
                })
                .catch(error => {
                    console.error('[Dashboard] Connection check failed:', error);
                    document.getElementById('connection-status').className = 'connection-status disconnected';
                    document.getElementById('connection-status').textContent = '🔴 Error connecting';
                });
        }
        
        function refreshData() {
            console.log('[Dashboard] Refreshing data...');
            loadStats();
            loadReadings();
        }
        
        function loadStats() {
            fetch('/api/stats')
                .then(response => {
                    if (response.status === 503) {
                        throw new Error('Pi server not connected');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('[Dashboard] Stats received:', data);
                    
                    if (!data || data.error) {
                        showError('Failed to load statistics: ' + (data.error || 'Unknown error'));
                        return;
                    }
                    
                    // Handle different data formats
                    let totalReadings = 0;
                    let avgMoisture = 0;
                    let criticalCount = 0;
                    let maxMoisture = 0;
                    
                    if (typeof data === 'object') {
                        totalReadings = data.count || data.total_readings || data.reading_count || 0;
                        avgMoisture = data.average || data.avg_moisture || data.mean_moisture || 0;
                        criticalCount = data.critical_count || data.critical || data.warnings || 0;
                        maxMoisture = data.max || data.max_moisture || data.highest || 0;
                    }
                    
                    const statsHtml = `
                        <div class="stat-card">
                            <div class="stat-label">Total Readings</div>
                            <div class="stat-value">${totalReadings}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Average Moisture</div>
                            <div class="stat-value">${Number(avgMoisture).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Critical Areas</div>
                            <div class="stat-value" style="color: #ff6b6b;">${criticalCount}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Highest Reading</div>
                            <div class="stat-value">${Number(maxMoisture).toFixed(1)}%</div>
                        </div>
                    `;
                    
                    document.getElementById('stats-container').innerHTML = statsHtml;
                })
                .catch(error => {
                    console.error('[Dashboard] Error loading stats:', error);
                    showError('Failed to load statistics: ' + error.message);
                });
        }
        
        function loadReadings() {
            fetch('/api/readings')
                .then(response => {
                    if (response.status === 503) {
                        throw new Error('Pi server not connected');
                    }
                    return response.json();
                })
                .then(readings => {
                    console.log('[Dashboard] Readings received:', readings);
                    console.log('[Dashboard] First reading:', readings[0]);
                    
                    const tbody = document.getElementById('readings-body');
                    
                    if (!readings || !Array.isArray(readings) || readings.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999; padding: 20px;">No readings yet. Waiting for data from Pi...</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = readings.map((reading, index) => {
                        // Handle different data formats
                        let dateTime = '';
                        let gpsLoc = '';
                        let moisture = '';
                        let temp = '';
                        let severity = '';
                        
                        if (typeof reading === 'string') {
                            // If it's a string, try to parse it
                            dateTime = reading.substring(0, 19) || 'N/A';
                            moisture = 'N/A';
                            gpsLoc = 'N/A';
                            temp = 'N/A';
                            severity = 'Unknown';
                        } else if (typeof reading === 'object') {
                            // If it's an object, extract properties
                            dateTime = reading.timestamp ? reading.timestamp.substring(0, 19) : 
                                      (reading.date && reading.time) ? `${reading.date} ${reading.time}` : 'N/A';
                            
                            gpsLoc = reading.gps_lat !== undefined && reading.gps_lng !== undefined ? 
                                    `${Number(reading.gps_lat).toFixed(4)}, ${Number(reading.gps_lng).toFixed(4)}` :
                                    (reading.location || 'N/A');
                            
                            moisture = reading.moisture !== undefined ? 
                                      `${Number(reading.moisture).toFixed(1)}%` : 'N/A';
                            
                            temp = reading.ir_temp !== undefined && reading.ir_temp !== null ? 
                                  `${Number(reading.ir_temp).toFixed(1)}°C` : 
                                  (reading.temperature !== undefined ? `${Number(reading.temperature).toFixed(1)}°C` : 'N/A');
                            
                            severity = reading.severity ? reading.severity.charAt(0).toUpperCase() + reading.severity.slice(1) : 'Unknown';
                        }
                        
                        return `
                            <tr>
                                <td>${dateTime}</td>
                                <td>${gpsLoc}</td>
                                <td>${moisture}</td>
                                <td>${temp}</td>
                                <td>
                                    <span class="severity-${severity.toLowerCase()}">
                                        ${severity}
                                    </span>
                                </td>
                            </tr>
                        `;
                    }).join('');
                })
                .catch(error => {
                    console.error('[Dashboard] Error loading readings:', error);
                    const tbody = document.getElementById('readings-body');
                    tbody.innerHTML = `<tr><td colspan="5" style="color: red; padding: 20px;">Error: ${error.message}</td></tr>`;
                });
        }
        
        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            console.error('[Dashboard]', message);
        }
        
        // Load on page load
        window.addEventListener('load', () => {
            console.log('[Dashboard] Page loaded');
            checkConnection();
            refreshData();
        });
        
        // Auto-refresh every 10 seconds
        setInterval(refreshData, 10000);
        setInterval(checkConnection, 15000);
    </script>
</body>
</html>
