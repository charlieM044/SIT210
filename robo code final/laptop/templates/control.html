<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDRX-1 // Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0c0f;
      --surface: #111418;
      --border:  #1e2329;
      --muted:   #2a3040;
      --text:    #c8d0dc;
      --dim:     #5a6478;
      --accent:  #00e5ff;
      --warn:    #ffb300;
      --danger:  #ff3d57;
      --ok:      #00e676;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    nav { display:flex; gap:2px; }
    nav a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--dim);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 4px;
      transition: all .2s;
    }
    nav a:hover, nav a.active { color: var(--accent); background: rgba(0,229,255,.07); }

    /* ── CONN BADGE ── */
    .conn-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .3s;
    }
    .conn-badge.online { border-color: var(--ok); color: var(--ok); }
    .conn-badge.online .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .conn-badge.offline { border-color: var(--danger); color: var(--danger); }
    .conn-badge.offline .dot { background: var(--danger); }
    .conn-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }

    /* ── MAIN LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      padding: 20px 24px;
      align-content: start;
      overflow-y: auto;
    }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .panel-body { padding: 16px 18px; }

    /* ── VIDEO ── */
    .video-panel {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    .video-wrap {
      position: relative;
      background: #000;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      top: 10px; left: 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      background: rgba(0,0,0,.6);
      padding: 4px 8px;
      border-radius: 3px;
      letter-spacing: .08em;
    }

    .video-offline {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #070a0d;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      letter-spacing: .1em;
    }

    .video-offline-icon {
      font-size: 32px;
      opacity: .3;
    }

    /* captured image section */
    .capture-section {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .capture-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #capturedImg {
      width: 100%;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: none;
    }

    #capturedStatus {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .06em;
    }

    /* ── CONTROL PANEL ── */
    .control-panel {
      grid-column: 2;
      grid-row: 1;
    }

    /* Mode strip */
    .mode-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-bottom: 16px;
    }

    .mode-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      padding: 10px;
      background: var(--bg);
      border: none;
      color: var(--dim);
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }

    .mode-btn:hover { background: rgba(0,229,255,.05); color: var(--text); }
    .mode-btn.active-manual { background: rgba(0,230,118,.08); color: var(--ok); }
    .mode-btn.active-auto   { background: rgba(255,179,0,.08);  color: var(--warn); }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      aspect-ratio: 1;
      margin: 0 auto;
      max-width: 220px;
    }

    .dpad-btn {
      font-family: var(--mono);
      font-size: 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      user-select: none;
    }

    .dpad-btn:hover  { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.06); }
    .dpad-btn:active { transform: scale(.94); background: rgba(0,229,255,.12); }

    .dpad-btn.stop-btn {
      border-color: var(--danger);
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .05em;
    }
    .dpad-btn.stop-btn:hover { background: rgba(255,61,87,.1); }

    .dpad-corner { pointer-events: none; opacity: 0; }

    /* Speed control */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .speed-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .08em;
      white-space: nowrap;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--muted);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent);
    }

    .speed-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      min-width: 36px;
      text-align: right;
    }

    /* Emergency stop */
    .estop {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: rgba(255,61,87,.1);
      border: 1px solid var(--danger);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--danger);
      cursor: pointer;
      transition: all .2s;
    }
    .estop:hover { background: rgba(255,61,87,.2); }

    /* Hint text */
    .key-hint {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      text-align: center;
      margin-top: 10px;
      letter-spacing: .06em;
    }

    /* ── SENSOR PANEL ── */
    .sensor-panel {
      grid-column: 2;
      grid-row: 2;
    }

    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .sensor-cell {
      background: var(--bg);
      padding: 14px 12px;
      text-align: center;
    }

    .sensor-key {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .1em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .sensor-val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .sensor-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      margin-top: 4px;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .status-icon { font-size: 14px; }
    .status-msg  { color: var(--text); flex: 1; }
    .status-time { color: var(--dim); font-size: 10px; }

    /* Icon btn (shared) */
    .icon-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all .2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .video-panel { grid-row: auto; }
      .control-panel, .sensor-panel { grid-column: 1; grid-row: auto; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    MDRX-1 // CONTROL
  </div>
  <nav>
    <a href="/">DASHBOARD</a>
    <a href="/map">MAP</a>
    <a href="/report">REPORT</a>
    <a href="/control" class="active">CONTROL</a>
  </nav>
  <div class="conn-badge" id="connBadge">
    <div class="dot"></div>
    <span id="connText">CONNECTING…</span>
  </div>
</div>

<main>

  <!-- Status bar -->
  <div class="status-bar" style="grid-column:1/-1; grid-row:1">
    <span class="status-icon" id="statusIcon">◌</span>
    <span class="status-msg"  id="statusMsg">Initializing…</span>
    <span class="status-time" id="statusTime">—</span>
  </div>

  <!-- Video panel -->
  <div class="panel video-panel" style="grid-row:2/4">
    <div class="panel-head">
      <span class="panel-title">Live Feed</span>
      <span class="panel-title" id="feedLabel" style="color:var(--danger)">OFFLINE</span>
    </div>
    <div class="video-wrap">
      <img id="videoFeed" src="/video_feed"
           onload="document.getElementById('feedLabel').textContent='LIVE'; document.getElementById('feedLabel').style.color='var(--ok)'"
           onerror="showVideoOffline()">
      <div class="video-overlay" id="videoOverlay">REC ●</div>
    </div>

    <div class="capture-section">
      <div class="capture-head">
        <span class="panel-title">Latest Capture</span>
        <button class="icon-btn" onclick="refreshCapture()">↺ REFRESH</button>
      </div>
      <img id="capturedImg" alt="Latest captured image">
      <div id="capturedStatus">No capture loaded</div>
    </div>
  </div>

  <!-- Control panel -->
  <div class="panel control-panel">
    <div class="panel-head">
      <span class="panel-title">Commands</span>
      <span class="panel-title" id="modeLabel">—</span>
    </div>
    <div class="panel-body">

      <!-- Mode toggle -->
      <div class="mode-strip">
        <button class="mode-btn" id="btnManual" onclick="setMode('manual')">▶ MANUAL</button>
        <button class="mode-btn" id="btnAuto"   onclick="setMode('autonomous')">⬡ AUTONOMOUS</button>
      </div>

      <!-- D-pad -->
      <div class="dpad">
        <div class="dpad-corner"></div>
        <button class="dpad-btn" onclick="cmd('forward')"  title="Forward (↑)">▲</button>
        <div class="dpad-corner"></div>
        <button class="dpad-btn" onclick="cmd('left')"     title="Left (←)">◀</button>
        <button class="dpad-btn stop-btn" onclick="cmd('stop')" title="Stop (Space)">STOP</button>
        <button class="dpad-btn" onclick="cmd('right')"    title="Right (→)">▶</button>
        <div class="dpad-corner"></div>
        <button class="dpad-btn" onclick="cmd('backward')" title="Back (↓)">▼</button>
        <div class="dpad-corner"></div>
      </div>

      <!-- Speed -->
      <div class="speed-row">
        <span class="speed-label">SPEED</span>
        <input type="range" id="speedSlider" min="0" max="100" value="60" step="5"
               oninput="document.getElementById('speedVal').textContent = this.value + '%'">
        <span class="speed-val" id="speedVal">60%</span>
      </div>

      <!-- E-stop -->
      <button class="estop" onclick="emergencyStop()">⬛ EMERGENCY STOP</button>

      <p class="key-hint">↑↓←→ ARROW KEYS · SPACE TO STOP</p>
    </div>
  </div>

  <!-- Sensor panel -->
  <div class="panel sensor-panel">
    <div class="panel-head">
      <span class="panel-title">Live Sensors</span>
      <span class="panel-title" id="sensorAge">—</span>
    </div>
    <div class="sensor-grid">
      <div class="sensor-cell">
        <div class="sensor-key">Moisture</div>
        <div class="sensor-val" id="sMoisture">—</div>
        <div class="sensor-sub" id="sSeverity">—</div>
      </div>
      <div class="sensor-cell">
        <div class="sensor-key">GPS</div>
        <div class="sensor-val" id="sGPS" style="font-size:13px">NO FIX</div>
        <div class="sensor-sub" id="sCoords">—</div>
      </div>
      <div class="sensor-cell">
        <div class="sensor-key">Uptime</div>
        <div class="sensor-val" id="sUptime" style="font-size:16px">—</div>
        <div class="sensor-sub">h m</div>
      </div>
    </div>
  </div>

</main>

<script>
  let currentMode = 'manual';

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setStatus(icon, msg) {
    document.getElementById('statusIcon').textContent = icon;
    document.getElementById('statusMsg').textContent  = msg;
    document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
  }

  function setConn(online, label) {
    const b = document.getElementById('connBadge');
    b.className = 'conn-badge ' + (online ? 'online' : 'offline');
    document.getElementById('connText').textContent = label;
  }

  function moistureColor(v) {
    if (v >= 80) return 'var(--danger)';
    if (v >= 60) return 'var(--warn)';
    return 'var(--ok)';
  }

  function fmtUptime(s) {
    if (!s && s !== 0) return '—';
    return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  }

  function showVideoOffline() {
    document.getElementById('feedLabel').textContent = 'OFFLINE';
    document.getElementById('feedLabel').style.color = 'var(--danger)';
    document.getElementById('videoOverlay').style.display = 'none';
  }

  // ── Mode ────────────────────────────────────────────────────────────────────
  function applyMode(mode) {
    currentMode = mode;
    const bm = document.getElementById('btnManual');
    const ba = document.getElementById('btnAuto');
    const ml = document.getElementById('modeLabel');
    bm.className = 'mode-btn' + (mode === 'manual' ? ' active-manual' : '');
    ba.className = 'mode-btn' + (mode === 'autonomous' ? ' active-auto' : '');
    ml.textContent = mode.toUpperCase();
    ml.style.color  = mode === 'manual' ? 'var(--ok)' : 'var(--warn)';
  }

  async function setMode(m) {
    try {
      const r = await fetch('/api/mode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: m })
      });
      const d = await r.json();
      if (r.ok) {
        applyMode(d.mode);
        setStatus(m === 'manual' ? '●' : '⬡',
          m === 'manual' ? 'Manual control enabled' : 'Autonomous mode active');
      }
    } catch (e) {
      setStatus('✗', 'Mode switch failed');
    }
  }

  // ── Commands ────────────────────────────────────────────────────────────────
  async function cmd(command) {
    const speed = command !== 'stop'
      ? parseInt(document.getElementById('speedSlider').value)
      : undefined;
    try {
      const r = await fetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command, ...(speed !== undefined && { speed }) })
      });
      const d = await r.json();
      if (!r.ok) {
        setStatus('✗', d.error || 'Command rejected');
      } else {
        const msg = d.executed
          ? `${command.toUpperCase()}${speed !== undefined ? ' @ ' + speed + '%' : ''}`
          : 'Autonomous active — command ignored';
        setStatus('→', msg);
      }
    } catch {
      setStatus('✗', 'Connection error');
      setConn(false, 'OFFLINE');
    }
  }

  async function emergencyStop() {
    await setMode('manual');
    await cmd('stop');
    setStatus('⬛', 'EMERGENCY STOP');
  }

  // ── Keyboard ────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (currentMode !== 'manual') return;
    const map = { ArrowUp:'forward', ArrowDown:'backward', ArrowLeft:'left', ArrowRight:'right', ' ':'stop' };
    if (map[e.key]) { cmd(map[e.key]); e.preventDefault(); }
  });

  // ── Sensor polling ──────────────────────────────────────────────────────────
  setInterval(async () => {
    try {
      const r = await fetch('/api/latest-reading');
      const d = await r.json();
      if (d && d.moisture != null) {
        const m = Number(d.moisture).toFixed(1);
        const mc = document.getElementById('sMoisture');
        mc.textContent = m + '%';
        mc.style.color = moistureColor(Number(m));

        const sev = (d.severity || 'minor').toLowerCase();
        const sc = document.getElementById('sSeverity');
        sc.textContent = sev.toUpperCase();
        sc.style.color = sev === 'critical' ? 'var(--danger)' : sev === 'moderate' ? 'var(--warn)' : 'var(--ok)';

        const ts = d.timestamp ? d.timestamp.substring(11,19) : d.time || '';
        document.getElementById('sensorAge').textContent = ts;

        if (d.gps_lat != null) {
          document.getElementById('sGPS').textContent = 'FIXED';
          document.getElementById('sGPS').style.color = 'var(--ok)';
          document.getElementById('sCoords').textContent =
            Number(d.gps_lat).toFixed(4) + ', ' + Number(d.gps_lng).toFixed(4);
        }
      }
    } catch {}
  }, 500);

  // ── Status polling ──────────────────────────────────────────────────────────
  setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      setConn(d.connected, d.connected ? 'ONLINE' : 'OFFLINE');
      document.getElementById('sUptime').textContent = fmtUptime(d.uptime_s);
    } catch {
      setConn(false, 'OFFLINE');
    }
  }, 3000);

  // ── Captured image ──────────────────────────────────────────────────────────
  async function refreshCapture() {
    const img = document.getElementById('capturedImg');
    const st  = document.getElementById('capturedStatus');
    st.textContent = 'Loading…';
    try {
      const r = await fetch(`/api/storage?type=images&t=${Date.now()}`);
      if (!r.ok) throw new Error('no image');
      const blob = await r.blob();
      if (!blob.type.startsWith('image/')) throw new Error('not image');
      img.src = URL.createObjectURL(blob);
      img.style.display = 'block';
      st.textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch {
      img.style.display = 'none';
      st.textContent = 'No capture available';
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  window.addEventListener('load', async () => {
    try {
      const r = await fetch('/api/mode');
      const d = await r.json();
      applyMode(d.mode);
      setStatus(d.mode === 'manual' ? '●' : '⬡',
        d.mode === 'manual' ? 'Manual control enabled' : 'Autonomous mode active');
    } catch {
      setStatus('✗', 'Could not reach Pi');
      setConn(false, 'OFFLINE');
    }

    try {
      const r = await fetch('/api/speed');
      const d = await r.json();
      if (d.speed != null) {
        const s = Math.max(0, Math.min(100, Number(d.speed)));
        document.getElementById('speedSlider').value = s;
        document.getElementById('speedVal').textContent = s + '%';
      }
    } catch {}

    try { await refreshCapture(); } catch {}
  });
</script>
</body>
</html>
