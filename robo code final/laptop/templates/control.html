<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f44336;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.online { background: #4caf50; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-start { background: #4caf50; color: white; }
        .btn-start:hover { background: #45a049; }
        .btn-stop { background: #f44336; color: white; }
        .btn-stop:hover { background: #da190b; }

        .movement-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .movement-btn {
            padding: 20px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .movement-btn:hover { background: #5568d3; transform: scale(1.05); }
        .movement-btn:active { transform: scale(0.95); }

        .forward    { grid-column: 2; grid-row: 1; }
        .left       { grid-column: 1; grid-row: 2; }
        .stop-center{ grid-column: 2; grid-row: 2; background: #ff9800; }
        .stop-center:hover { background: #e68a00; }
        .right      { grid-column: 3; grid-row: 2; }
        .backward   { grid-column: 2; grid-row: 3; }

        .emergency-stop {
            width: 100%;
            padding: 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .emergency-stop:hover { background: #da190b; }

        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .back-btn:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Robot Control Panel</h1>
            <p style="color: rgba(255,255,255,0.9);">Remote robot command interface</p>
        </header>

        <div class="controls-grid">

            <!-- Video feed card -->
            <div class="card">
                <h2>📹 Video Feed</h2>
                <img src="/video_feed" width="640" height="480"
                     style="width:100%; border-radius:8px;"
                     onerror="this.outerHTML='<p style=\'color:#999;text-align:center;padding:40px\'>Video feed offline</p>'">
            </div>

                <!-- Control card -->
            <div class="card">
                <h2>🎮 Control Commands</h2>

                <div class="status-box">
                    <span class="status-indicator" id="statusLight"></span>
                    <span id="statusText">Initializing...</span>
                    <span id="modeBadge" style="
                        margin-left: 12px;
                        padding: 2px 10px;
                        border-radius: 12px;
                        font-size: 0.8em;
                        font-weight: bold;
                        background: #e0e0e0;
                        color: #555;
                    ">...</span>
                </div>

                <div class="button-group">
                    <button class="btn btn-start" onclick="setRobotMode('manual')">▶️ MANUAL MODE</button>
                    <button class="btn btn-stop"  onclick="setRobotMode('autonomous')">🤖 AUTONOMOUS</button>
                </div>

                <h3 style="margin: 20px 0 10px 0; color: #333;">Movement Controls</h3>
                <div class="movement-pad">
                    <button class="movement-btn forward"     onclick="sendRobotCommand('forward')">▲ Forward</button>
                    <button class="movement-btn left"        onclick="sendRobotCommand('left')">◀ Left</button>
                    <button class="movement-btn stop-center" onclick="sendRobotCommand('stop')">■ Stop</button>
                    <button class="movement-btn right"       onclick="sendRobotCommand('right')">Right ▶</button>
                    <button class="movement-btn backward"    onclick="sendRobotCommand('backward')">▼ Back</button>
                </div>

                <!-- Speed slider -->
                <div style="margin: 20px 0 10px 0;">
                    <label for="speed-slider" style="display:flex; justify-content:space-between; margin-bottom:6px; color:#333; font-weight:bold;">
                        <span>⚡ Speed</span>
                        <span id="speed-label">60</span>%
                    </label>
                    <input type="range" id="speed-slider" min="10" max="100" value="60" step="5"
                        style="width:100%;"
                        oninput="document.getElementById('speed-label').textContent = this.value">
                </div>

                <button class="emergency-stop" onclick="emergencyStop()">🚨 EMERGENCY STOP</button>

                <p style="color:#666; font-size:0.9em; margin-top:15px; text-align:center;">
                    💡 Arrow keys to move. Spacebar to stop.
                </p>
            </div>
        <!-- Live sensor data -->
        <div class="card" style="margin-top: 20px;">
            <h2>📊 Live Sensor Data</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="status-box">
                    <div style="font-size: 0.9em; color: #999;">Moisture</div>
                    <div id="liveMoisture" style="font-size: 2em; font-weight: bold; color: #667eea;">—</div>
                    <div style="font-size: 0.8em; color: #ccc;" id="moistureTime">no data</div>
                </div>
                <div class="status-box">
                    <div style="font-size: 0.9em; color: #999;">GPS Status</div>
                    <div id="liveGPS" style="font-size: 1.2em; font-weight: bold; color: #f44336;">NO FIX</div>
                    <div style="font-size: 0.8em; color: #ccc;" id="gpsCoords">—</div>
                </div>
                <div class="status-box">
                    <div style="font-size: 0.9em; color: #999;">Wall Distance</div>
                    <div id="liveWall" style="font-size: 1.5em; font-weight: bold; color: #4caf50;">—</div>
                    <div style="font-size: 0.8em; color: #ccc;">cm</div>
                </div>
            </div>
        </div>

        <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>

    <script>
        let currentMode = 'manual';

        function updateStatus(message, online = false) {
            document.getElementById('statusText').textContent = message;
            document.getElementById('statusLight').classList.toggle('online', online);
        }

        function updateMode(mode) {
            currentMode = mode;
            const badge = document.getElementById('modeBadge');
            if (mode === 'manual') {
                badge.textContent = 'MANUAL';
                badge.style.background = '#c8e6c9';
                badge.style.color = '#2e7d32';
            } else {
                badge.textContent = 'AUTONOMOUS';
                badge.style.background = '#fff3e0';
                badge.style.color = '#e65100';
            }
        }

        // Live sensor updates every 500ms
        setInterval(async () => {
            try {
                const r = await fetch('/api/latest-reading');
                const reading = await r.json();
                if (reading && reading.moisture !== null) {
                    const moisture = Number(reading.moisture).toFixed(1);
                    const color = moisture >= 80 ? '#f44336' : moisture >= 60 ? '#ff9800' : '#4caf50';
                    document.getElementById('liveMoisture').textContent = moisture + '%';
                    document.getElementById('liveMoisture').style.color = color;
                    
                    const ts = reading.timestamp ? reading.timestamp.substring(11, 19) : reading.time || '';
                    document.getElementById('moistureTime').textContent = ts;
                    
                    if (reading.gps_lat && reading.gps_lng) {
                        document.getElementById('liveGPS').textContent = '✓ FIXED';
                        document.getElementById('liveGPS').style.color = '#4caf50';
                        document.getElementById('gpsCoords').textContent = 
                            Number(reading.gps_lat).toFixed(4) + ', ' + Number(reading.gps_lng).toFixed(4);
                    }
                }
            } catch(e) {}
        }, 500);

        async function sendRobotCommand(commandName) {
            try {
                const speed = commandName !== 'stop'
                    ? parseInt(document.getElementById('speed-slider').value)
                    : undefined;

                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: commandName, ...(speed !== undefined && { speed }) })
                });

                const data = await response.json();
                if (!response.ok) {
                    updateStatus(`✗ Error: ${data.error || 'Command rejected'}`, false);
                } else {
                    const msg = data.executed
                        ? `Moving: ${commandName.toUpperCase()}${speed !== undefined ? ` at ${speed}%` : ''}`
                        : `Autonomous mode active — command ignored`;
                    updateStatus(msg, data.executed);
                }
            } catch (err) {
                console.error('Error sending command:', err);
                updateStatus('✗ Connection Error', false);
            }
        }
        
         function initSpeedSlider() {
            try {
                const res  = await fetch('/api/speed');
                const data = await res.json();
                if (data.speed && data.speed > 0) {
                    document.getElementById('speed-slider').value = data.speed;
                    document.getElementById('speed-label').textContent  = data.speed;
                }
            } catch {
                // non-fatal — slider stays at default 60%
            }
        }

        async function setRobotMode(modeName) {
            try {
                const response = await fetch('/api/mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: modeName })
                });
                const data = await response.json();
                if (response.ok) {
                    updateMode(data.mode);
                    updateStatus(
                        data.mode === 'manual' ? '✅ Manual control enabled' : '🤖 Autonomous mode active',
                        true
                    );
                }
            } catch (err) {
                console.error('Error setting mode:', err);
                updateStatus('❌ Mode switch failed', false);
            }
        }

        async function emergencyStop() {
            await setRobotMode('manual');
            await sendRobotCommand('stop');
            updateStatus('🚨 EMERGENCY STOP ACTIVATED', false);
        }

        document.addEventListener('keydown', (e) => {
            if (currentMode !== 'manual') return;
            switch(e.key) {
                case 'ArrowUp':    sendRobotCommand('forward');  e.preventDefault(); break;
                case 'ArrowDown':  sendRobotCommand('backward'); e.preventDefault(); break;
                case 'ArrowLeft':  sendRobotCommand('left');     e.preventDefault(); break;
                case 'ArrowRight': sendRobotCommand('right');    e.preventDefault(); break;
                case ' ':          sendRobotCommand('stop');     e.preventDefault(); break;
            }
        });

        window.addEventListener('load', async () => {
            try {
                const r = await fetch('/api/mode');
                const data = await r.json();
                updateMode(data.mode);
                updateStatus(
                    data.mode === 'manual' ? ':) Manual control enabled' : ';] Autonomous mode active',
                    true
                );
            } catch (err) {
                updateStatus('X Could not reach Pi', false);
            }
                await initSpeedSlider();
        });
    </script>
</body>
</html>
